name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Test & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Tests — publishable packages only
      - name: Run tests — traits
        working-directory: packages/traits
        run: npx vitest run

      - name: Run tests — core
        working-directory: packages/core
        run: npx vitest run

      - name: Run tests — sessions
        working-directory: packages/sessions
        run: npx vitest run

      - name: Run tests — surfaces
        working-directory: packages/surfaces
        run: npx vitest run

      - name: Run tests — vfs
        working-directory: packages/vfs
        run: npx vitest run

      # Harness depends on traits, connectivity, coordination, and turn-context via
      # workspace file: links. None of those dists (except turn-context's, which is
      # stale and references a `memory-retriever.js` that isn't in the committed
      # dist) are ready for vitest on a fresh checkout. Build them in dependency
      # order before running harness tests.
      #
      # Chain:
      #   traits        — leaf (no workspace deps)
      #   memory        — leaf (no workspace deps); needed by turn-context type imports
      #   connectivity  — leaf (no workspace deps)
      #   coordination  — needs connectivity
      #   turn-context  — needs memory + traits (type-only); rebuilt to refresh stale dist
      - name: Build — traits (harness dep)
        working-directory: packages/traits
        run: npm run build

      - name: Build — memory (turn-context dep)
        working-directory: packages/memory
        run: npm run build

      - name: Build — connectivity (harness dep)
        working-directory: packages/connectivity
        run: npm run build

      - name: Build — coordination (harness dep)
        working-directory: packages/coordination
        run: npm run build

      - name: Rebuild — turn-context (committed dist is stale)
        working-directory: packages/turn-context
        run: |
          rm -rf dist
          npm run build

      - name: Run tests — harness
        working-directory: packages/harness
        run: npx vitest run

      # Telemetry depends on harness types (HarnessUsage / HarnessResult).
      # Build harness first so the workspace file: link resolves, then test.
      - name: Build — harness (telemetry dep)
        working-directory: packages/harness
        run: npm run build

      - name: Run tests — telemetry
        working-directory: packages/telemetry
        run: npx vitest run

      # Build/typecheck in dependency order so downstream workspace imports resolve
      - name: Build — traits
        working-directory: packages/traits
        run: npm run build

      - name: Typecheck — traits
        working-directory: packages/traits
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build — core
        working-directory: packages/core
        run: npm run build

      - name: Typecheck — core
        working-directory: packages/core
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build — sessions
        working-directory: packages/sessions
        run: npm run build

      - name: Typecheck — sessions
        working-directory: packages/sessions
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build — surfaces
        working-directory: packages/surfaces
        run: npm run build

      - name: Typecheck — surfaces
        working-directory: packages/surfaces
        run: npx tsc --noEmit -p tsconfig.json

      # proactive must be built AFTER surfaces — proactive imports the
      # BotChannel type from @agent-assistant/surfaces (added in #36's
      # channel-picker and notify-channel-resolver).
      - name: Build — proactive (needs surfaces)
        working-directory: packages/proactive
        run: npm run build

      - name: Typecheck — proactive
        working-directory: packages/proactive
        run: npx tsc --noEmit -p tsconfig.json

      - name: Run tests — proactive
        working-directory: packages/proactive
        run: npx vitest run

      - name: Build — vfs
        working-directory: packages/vfs
        run: npm run build

      - name: Typecheck — vfs
        working-directory: packages/vfs
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build — telemetry
        working-directory: packages/telemetry
        run: npm run build

      - name: Typecheck — telemetry
        working-directory: packages/telemetry
        run: npx tsc --noEmit -p tsconfig.json

      - name: Verify no test artifacts in dist
        run: |
          FAIL=0
          for pkg in traits core sessions surfaces vfs telemetry; do
            if find "packages/$pkg/dist" -name '*.test.*' 2>/dev/null | grep -q .; then
              echo "ERROR: test artifacts found in packages/$pkg/dist/"
              find "packages/$pkg/dist" -name '*.test.*'
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "No test artifacts in dist — OK"
