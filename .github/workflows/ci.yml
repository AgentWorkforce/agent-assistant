name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Test & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Tests — publishable packages only
      - name: Run tests — traits
        working-directory: packages/traits
        run: npx vitest run

      - name: Run tests — core
        working-directory: packages/core
        run: npx vitest run

      - name: Run tests — sessions
        working-directory: packages/sessions
        run: npx vitest run

      - name: Run tests — surfaces
        working-directory: packages/surfaces
        run: npx vitest run

      # Typecheck — publishable packages only
      - name: Typecheck — traits
        working-directory: packages/traits
        run: npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — core
        working-directory: packages/core
        run: npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — sessions
        working-directory: packages/sessions
        run: npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — surfaces
        working-directory: packages/surfaces
        run: npx tsc --noEmit -p tsconfig.json

      # Build — DAG order: traits → core → sessions, surfaces
      - name: Build — traits
        working-directory: packages/traits
        run: npm run build

      - name: Build — core
        working-directory: packages/core
        run: npm run build

      - name: Build — sessions
        working-directory: packages/sessions
        run: npm run build

      - name: Build — surfaces
        working-directory: packages/surfaces
        run: npm run build
