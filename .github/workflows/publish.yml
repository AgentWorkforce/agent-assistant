name: Publish Packages

# Publish workflow for Agent Assistant runtime package waves.
# Uses a centralized package-group resolver so validation, versioning,
# artifacts, and publish jobs stay aligned as the package surface grows.

on:
  workflow_dispatch:
    inputs:
      package_group:
        description: "Package group to publish"
        required: true
        type: choice
        options:
          - runtime-core
        default: runtime-core
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
        default: "patch"
      custom_version:
        description: "Custom version (optional, overrides version type)"
        required: false
        type: string
      preid:
        description: "Prerelease identifier"
        required: false
        type: choice
        options:
          - beta
          - alpha
          - rc
        default: "beta"
      dry_run:
        description: "Dry run (do not actually publish)"
        required: false
        type: boolean
        default: false
      tag:
        description: "NPM dist-tag"
        required: false
        type: choice
        options:
          - latest
          - next
          - beta
        default: "latest"

concurrency:
  group: publish-packages
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "22.14.0"
  NPM_REGISTRY_URL: "https://registry.npmjs.org"

jobs:
  resolve-packages:
    name: Resolve package group
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      first_package: ${{ steps.resolve.outputs.first_package }}
      package_list: ${{ steps.resolve.outputs.package_list }}
    steps:
      - name: Resolve publish matrix
        id: resolve
        run: |
          case "${{ github.event.inputs.package_group }}" in
            runtime-core)
              PACKAGES='["traits","connectivity","coordination","core","sessions","surfaces","policy","proactive","harness","memory","turn-context","inbox","continuation","sdk","vfs","specialists"]'
              FIRST='traits'
              ;;
            *)
              echo "Unsupported package group: ${{ github.event.inputs.package_group }}" >&2
              exit 1
              ;;
          esac

          echo "matrix=${PACKAGES}" >> "$GITHUB_OUTPUT"
          echo "first_package=${FIRST}" >> "$GITHUB_OUTPUT"
          echo "package_list=$(echo "$PACKAGES" | tr -d '[]\"')" >> "$GITHUB_OUTPUT"
          echo "Publishing package group: ${{ github.event.inputs.package_group }}"
          echo "Packages: $PACKAGES"

  build:
    name: Build, validate, and version
    runs-on: ubuntu-latest
    needs: resolve-packages
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      matrix: ${{ needs.resolve-packages.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY_URL }}
          cache: npm

      - name: Update npm to latest (required for provenance)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Confirm publish strategy
        run: |
          echo "Publishing Agent Assistant package group: ${{ github.event.inputs.package_group }}"
          echo "Packages: ${{ needs.resolve-packages.outputs.package_list }}"

      # Harness tests import from @agent-assistant/{traits,connectivity,
      # coordination,turn-context}, several of which are file: workspace deps
      # with stale or missing committed dists. Build the chain before running
      # vitest so its resolver can find each package's dist/. Mirrors
      # .github/workflows/ci.yml. Note: connectivity + coordination are not
      # in the publish matrix, so the dependency-aware Build step below does
      # not cover them.
      - name: Prepare harness test dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm run build -w @agent-assistant/traits
          npm run build -w @agent-assistant/memory
          npm run build -w @agent-assistant/connectivity
          npm run build -w @agent-assistant/coordination
          rm -rf packages/turn-context/dist
          npm run build -w @agent-assistant/turn-context

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          for pkg in $(echo '${{ needs.resolve-packages.outputs.matrix }}' | jq -r '.[]'); do
            if [ -f "packages/$pkg/package.json" ] && jq -e '.scripts.test' "packages/$pkg/package.json" >/dev/null; then
              echo "==> Testing $pkg"
              npm test -w "@agent-assistant/$pkg"
            fi
          done

      - name: Build packages in dependency-aware order
        shell: bash
        run: |
          set -euo pipefail
          ORDER=(traits connectivity coordination core sessions surfaces policy proactive harness memory turn-context inbox continuation sdk vfs specialists)
          for pkg in "${ORDER[@]}"; do
            if echo '${{ needs.resolve-packages.outputs.matrix }}' | jq -e --arg pkg "$pkg" '.[] | select(. == $pkg)' >/dev/null; then
              echo "==> Building $pkg"
              npm run build -w "@agent-assistant/$pkg"
            fi
          done

      - name: Typecheck packages
        shell: bash
        run: |
          set -euo pipefail
          for pkg in $(echo '${{ needs.resolve-packages.outputs.matrix }}' | jq -r '.[]'); do
            if [ -f "packages/$pkg/package.json" ] && jq -e '.scripts.typecheck' "packages/$pkg/package.json" >/dev/null; then
              echo "==> Typechecking $pkg"
              npm run typecheck -w "@agent-assistant/$pkg"
            else
              echo "==> Typechecking $pkg via tsc"
              (cd "packages/$pkg" && npx tsc --noEmit -p tsconfig.json)
            fi
          done

      - name: Verify no test artifacts in dist
        shell: bash
        run: |
          set -euo pipefail
          FAIL=0
          for pkg in $(echo '${{ needs.resolve-packages.outputs.matrix }}' | jq -r '.[]'); do
            if find "packages/$pkg/dist" -name '*.test.*' 2>/dev/null | grep -q .; then
              echo "ERROR: test artifacts found in packages/$pkg/dist/"
              find "packages/$pkg/dist" -name '*.test.*'
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "No test artifacts in dist — OK"

      - name: Version all publishable packages
        id: version
        shell: bash
        run: |
          set -euo pipefail
          CUSTOM="${{ github.event.inputs.custom_version }}"
          BUMP="${{ github.event.inputs.version }}"
          PREID="${{ github.event.inputs.preid }}"
          FIRST="${{ needs.resolve-packages.outputs.first_package }}"

          cd "packages/$FIRST"
          if [ -n "$CUSTOM" ]; then
            npm version "$CUSTOM" --no-git-tag-version
          elif [[ "$BUMP" == pre* ]]; then
            npm version "$BUMP" --preid="$PREID" --no-git-tag-version
          else
            npm version "$BUMP" --no-git-tag-version
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          cd ../..

          for pkg in $(echo '${{ needs.resolve-packages.outputs.matrix }}' | jq -r '.[]'); do
            if [ "$pkg" = "$FIRST" ]; then
              continue
            fi
            CURRENT_VERSION=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$CURRENT_VERSION" = "$NEW_VERSION" ]; then
              echo "==> Skipping $pkg, already at $NEW_VERSION"
              continue
            fi
            (cd "packages/$pkg" && npm version "$NEW_VERSION" --no-git-tag-version)
          done

          export NEW_VERSION
          export PACKAGES='${{ needs.resolve-packages.outputs.matrix }}'
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const version = process.env.NEW_VERSION;
          const packages = JSON.parse(process.env.PACKAGES);
          const packageNames = new Set(packages.map((pkg) => `@agent-assistant/${pkg}`));

          for (const pkg of packages) {
            const packageJsonPath = path.join('packages', pkg, 'package.json');
            const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));

            for (const depField of ['dependencies', 'peerDependencies', 'optionalDependencies']) {
              const deps = packageJson[depField];
              if (!deps) continue;
              for (const [name, value] of Object.entries(deps)) {
                if (packageNames.has(name) && String(value).startsWith('file:')) {
                  deps[name] = `^${version}`;
                }
              }
            }

            fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          }
          EOF

      - name: Upload build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/publish-artifacts
          for pkg in $(echo '${{ needs.resolve-packages.outputs.matrix }}' | jq -r '.[]'); do
            cp -R "packages/$pkg/dist" "/tmp/publish-artifacts/dist-$pkg"
            cp "packages/$pkg/package.json" "/tmp/publish-artifacts/manifest-$pkg.json"
          done

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: publish-artifacts
          path: /tmp/publish-artifacts
          retention-days: 1

  publish:
    name: Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [resolve-packages, build]
    strategy:
      max-parallel: 1
      matrix:
        package: ${{ fromJson(needs.resolve-packages.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY_URL }}
          cache: npm

      - name: Update npm to latest (required for provenance)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: publish-artifacts
          path: /tmp/publish-artifacts

      - name: Restore package artifacts
        run: |
          rm -rf "packages/${{ matrix.package }}/dist"
          cp -R "/tmp/publish-artifacts/dist-${{ matrix.package }}" "packages/${{ matrix.package }}/dist"
          cp "/tmp/publish-artifacts/manifest-${{ matrix.package }}.json" "packages/${{ matrix.package }}/package.json"

      - name: Publish package
        working-directory: packages/${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npm publish --provenance --access public --tag "${{ github.event.inputs.tag }}" --dry-run
          else
            npm publish --provenance --access public --tag "${{ github.event.inputs.tag }}"
          fi

  commit-version-bumps:
    name: Commit version bumps
    runs-on: ubuntu-latest
    needs: [resolve-packages, build, publish]
    if: github.event.inputs.dry_run != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: publish-artifacts
          path: /tmp/publish-artifacts

      - name: Restore package manifests
        run: |
          for pkg in $(echo '${{ needs.resolve-packages.outputs.matrix }}' | jq -r '.[]'); do
            cp "/tmp/publish-artifacts/manifest-$pkg.json" "packages/$pkg/package.json"
          done

      - name: Commit and push version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $(for pkg in $(echo '${{ needs.resolve-packages.outputs.matrix }}' | jq -r '.[]'); do echo "packages/$pkg/package.json"; done)
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi
          git commit -m "chore(release): publish ${{ github.event.inputs.package_group }} v${{ needs.build.outputs.new_version }}"
          git push origin main
