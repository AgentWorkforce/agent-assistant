name: Publish Packages

# Publish workflow for the initial public Agent Assistant SDK package wave.
# This workflow implements the npm provenance requirements directly in YAML.
# It intentionally avoids runtime dependency on @agentworkforce/workload-router
# so publish remains deterministic in a clean GitHub Actions environment.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
        default: "patch"
      custom_version:
        description: "Custom version (optional, overrides version type)"
        required: false
        type: string
      preid:
        description: "Prerelease identifier"
        required: false
        type: choice
        options:
          - beta
          - alpha
          - rc
        default: "beta"
      dry_run:
        description: "Dry run (do not actually publish)"
        required: false
        type: boolean
        default: false
      tag:
        description: "NPM dist-tag"
        required: false
        type: choice
        options:
          - latest
          - next
          - beta
        default: "latest"

concurrency:
  group: publish-packages
  cancel-in-progress: false

# Required for npm OIDC provenance attestation.
# TARGET STATE: Full OIDC with no NPM_TOKEN, pending trusted publisher registration
# on npmjs.com for each package (manual step).
# Until trusted publisher registration is complete, NODE_AUTH_TOKEN is used as bridge.
permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build & Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      matrix: ${{ steps.packages.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Update npm to latest (required for provenance)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Confirm publish strategy
        run: |
          echo "Publishing the initial public Agent Assistant SDK wave with npm provenance enabled."
          echo "Packages: traits, core, sessions, surfaces, policy, proactive, harness, turn-context, sdk"

      - name: Run tests — traits
        working-directory: packages/traits
        run: npx vitest run
      - name: Run tests — core
        working-directory: packages/core
        run: npx vitest run
      - name: Run tests — sessions
        working-directory: packages/sessions
        run: npx vitest run
      - name: Run tests — surfaces
        working-directory: packages/surfaces
        run: npx vitest run
      - name: Run tests — policy
        working-directory: packages/policy
        run: npx vitest run
      - name: Run tests — proactive
        working-directory: packages/proactive
        run: npx vitest run
      - name: Run tests — harness
        working-directory: packages/harness
        run: npx vitest run
      - name: Run tests — turn-context
        working-directory: packages/turn-context
        run: npx vitest run

      - name: Build — traits
        working-directory: packages/traits
        run: npm run build
      - name: Build — core
        working-directory: packages/core
        run: npm run build
      - name: Build — sessions
        working-directory: packages/sessions
        run: npm run build
      - name: Build — surfaces
        working-directory: packages/surfaces
        run: npm run build
      - name: Build — policy
        working-directory: packages/policy
        run: npm run build
      - name: Build — proactive
        working-directory: packages/proactive
        run: npm run build
      - name: Build — harness
        working-directory: packages/harness
        run: npm run build
      - name: Build — turn-context
        working-directory: packages/turn-context
        run: npm run build
      - name: Build — sdk
        working-directory: packages/sdk
        run: npm run build

      - name: Typecheck — traits
        working-directory: packages/traits
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck — core
        working-directory: packages/core
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck — sessions
        working-directory: packages/sessions
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck — surfaces
        working-directory: packages/surfaces
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck — policy
        working-directory: packages/policy
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck — proactive
        working-directory: packages/proactive
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck — harness
        working-directory: packages/harness
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck — turn-context
        working-directory: packages/turn-context
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck — sdk
        working-directory: packages/sdk
        run: npx tsc --noEmit -p tsconfig.json

      - name: Verify no test artifacts in dist
        run: |
          FAIL=0
          for pkg in traits core sessions surfaces policy proactive harness turn-context sdk; do
            if find "packages/$pkg/dist" -name '*.test.*' 2>/dev/null | grep -q .; then
              echo "ERROR: test artifacts found in packages/$pkg/dist/"
              find "packages/$pkg/dist" -name '*.test.*'
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "No test artifacts in dist — OK"

      - name: Set publish matrix
        id: packages
        run: echo 'matrix=["traits","core","sessions","surfaces","policy","proactive","harness","turn-context","sdk"]' >> "$GITHUB_OUTPUT"

      - name: Version all publishable packages
        id: version
        run: |
          CUSTOM="${{ github.event.inputs.custom_version }}"
          BUMP="${{ github.event.inputs.version }}"
          PREID="${{ github.event.inputs.preid }}"

          cd packages/traits
          if [ -n "$CUSTOM" ]; then
            npm version "$CUSTOM" --no-git-tag-version
          elif [[ "$BUMP" == pre* ]]; then
            npm version "$BUMP" --preid="$PREID" --no-git-tag-version
          else
            npm version "$BUMP" --no-git-tag-version
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          cd ../..

          for pkg in core sessions surfaces policy proactive harness turn-context sdk; do
            cd "packages/$pkg"
            npm version "$NEW_VERSION" --no-git-tag-version
            cd ../..
          done

      - name: Upload build artifact — traits
        uses: actions/upload-artifact@v4
        with:
          name: dist-traits
          path: packages/traits/dist
          retention-days: 1
      - name: Upload build artifact — core
        uses: actions/upload-artifact@v4
        with:
          name: dist-core
          path: packages/core/dist
          retention-days: 1
      - name: Upload build artifact — sessions
        uses: actions/upload-artifact@v4
        with:
          name: dist-sessions
          path: packages/sessions/dist
          retention-days: 1
      - name: Upload build artifact — surfaces
        uses: actions/upload-artifact@v4
        with:
          name: dist-surfaces
          path: packages/surfaces/dist
          retention-days: 1
      - name: Upload build artifact — policy
        uses: actions/upload-artifact@v4
        with:
          name: dist-policy
          path: packages/policy/dist
          retention-days: 1
      - name: Upload build artifact — proactive
        uses: actions/upload-artifact@v4
        with:
          name: dist-proactive
          path: packages/proactive/dist
          retention-days: 1
      - name: Upload build artifact — harness
        uses: actions/upload-artifact@v4
        with:
          name: dist-harness
          path: packages/harness/dist
          retention-days: 1
      - name: Upload build artifact — turn-context
        uses: actions/upload-artifact@v4
        with:
          name: dist-turn-context
          path: packages/turn-context/dist
          retention-days: 1
      - name: Upload build artifact — sdk
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdk
          path: packages/sdk/dist
          retention-days: 1

      - name: Upload manifest — traits
        uses: actions/upload-artifact@v4
        with:
          name: manifest-traits
          path: packages/traits/package.json
          retention-days: 1
      - name: Upload manifest — core
        uses: actions/upload-artifact@v4
        with:
          name: manifest-core
          path: packages/core/package.json
          retention-days: 1
      - name: Upload manifest — sessions
        uses: actions/upload-artifact@v4
        with:
          name: manifest-sessions
          path: packages/sessions/package.json
          retention-days: 1
      - name: Upload manifest — surfaces
        uses: actions/upload-artifact@v4
        with:
          name: manifest-surfaces
          path: packages/surfaces/package.json
          retention-days: 1
      - name: Upload manifest — policy
        uses: actions/upload-artifact@v4
        with:
          name: manifest-policy
          path: packages/policy/package.json
          retention-days: 1
      - name: Upload manifest — proactive
        uses: actions/upload-artifact@v4
        with:
          name: manifest-proactive
          path: packages/proactive/package.json
          retention-days: 1
      - name: Upload manifest — harness
        uses: actions/upload-artifact@v4
        with:
          name: manifest-harness
          path: packages/harness/package.json
          retention-days: 1
      - name: Upload manifest — turn-context
        uses: actions/upload-artifact@v4
        with:
          name: manifest-turn-context
          path: packages/turn-context/package.json
          retention-days: 1
      - name: Upload manifest — sdk
        uses: actions/upload-artifact@v4
        with:
          name: manifest-sdk
          path: packages/sdk/package.json
          retention-days: 1

  publish:
    name: Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      max-parallel: 1
      matrix:
        package: ${{ fromJson(needs.build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Update npm to latest to reduce provenance/OIDC issues on stale runners.
      - name: Update npm to latest (required for provenance)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Download build artifact — ${{ matrix.package }}
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: packages/${{ matrix.package }}/dist

      - name: Download manifest — ${{ matrix.package }}
        uses: actions/download-artifact@v4
        with:
          name: manifest-${{ matrix.package }}
          path: packages/${{ matrix.package }}

      - name: Publish @agent-assistant/${{ matrix.package }}
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: packages/${{ matrix.package }}
        run: npm publish --access public --provenance --tag ${{ github.event.inputs.tag }} --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish — @agent-assistant/${{ matrix.package }}
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: packages/${{ matrix.package }}
        run: npm publish --access public --dry-run --ignore-scripts

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download manifest — traits
        uses: actions/download-artifact@v4
        with:
          name: manifest-traits
          path: packages/traits
      - name: Download manifest — core
        uses: actions/download-artifact@v4
        with:
          name: manifest-core
          path: packages/core
      - name: Download manifest — sessions
        uses: actions/download-artifact@v4
        with:
          name: manifest-sessions
          path: packages/sessions
      - name: Download manifest — surfaces
        uses: actions/download-artifact@v4
        with:
          name: manifest-surfaces
          path: packages/surfaces
      - name: Download manifest — policy
        uses: actions/download-artifact@v4
        with:
          name: manifest-policy
          path: packages/policy
      - name: Download manifest — proactive
        uses: actions/download-artifact@v4
        with:
          name: manifest-proactive
          path: packages/proactive
      - name: Download manifest — sdk
        uses: actions/download-artifact@v4
        with:
          name: manifest-sdk
          path: packages/sdk

      - name: Validate downloaded manifests
        run: |
          EXPECTED="${{ needs.build.outputs.new_version }}"
          for pkg in traits core sessions surfaces policy proactive harness turn-context sdk; do
            if [ ! -f "packages/$pkg/package.json" ]; then
              echo "ERROR: packages/$pkg/package.json not found after artifact download"
              exit 1
            fi
            VERSION=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$VERSION" != "$EXPECTED" ]; then
              echo "ERROR: packages/$pkg/package.json version $VERSION != expected $EXPECTED"
              exit 1
            fi
          done
          echo "All manifests validated at v${EXPECTED} — OK"

      - name: Commit version bump
        run: |
          NEW_VERSION="${{ needs.build.outputs.new_version }}"
          git add packages/traits/package.json packages/core/package.json packages/sessions/package.json packages/surfaces/package.json packages/policy/package.json packages/proactive/package.json packages/sdk/package.json
          git commit -m "chore: bump version to v${NEW_VERSION}" || echo "No changes to commit"
          git push

      - name: Create version tag
        run: |
          NEW_VERSION="${{ needs.build.outputs.new_version }}"
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.new_version }}
          name: v${{ needs.build.outputs.new_version }}
          generate_release_notes: true
